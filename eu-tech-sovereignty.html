<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EU Tech Sovereignty — Interactive Explorer</title>
<style>
  :root{
    --bg:#ffffff;--bg-soft:#f6f8fc;--ink:#1b2333;--ink-soft:#5a6478;--line:#e4e9f2;
    --eu:#003399;--eu-soft:#e8efff;--accent:#1a73e8;--gold:#ffcc00;
    --green:#1f8a4c;--amber:#c77d18;--violet:#6b4ea0;
    --shadow:0 1px 2px rgba(16,30,70,.06),0 8px 24px rgba(16,30,70,.06);--radius:14px;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:var(--bg);line-height:1.55;-webkit-font-smoothing:antialiased}
  a{color:var(--accent);text-decoration:none}
  a:hover{text-decoration:underline}
  header.nav{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.86);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
  .nav-inner{max-width:1180px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;gap:22px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:10px;font-weight:700;letter-spacing:-.01em}
  .brand .stars{width:26px;height:26px;border-radius:50%;background:var(--eu);color:var(--gold);display:flex;align-items:center;justify-content:center;font-size:13px}
  .nav-links{display:flex;gap:6px;margin-left:auto;flex-wrap:wrap}
  .nav-links a{padding:7px 13px;border-radius:999px;color:var(--ink-soft);font-size:14px;font-weight:500}
  .nav-links a:hover{background:var(--bg-soft);text-decoration:none;color:var(--ink)}
  .lang{display:flex;border:1px solid var(--line);border-radius:999px;overflow:hidden;margin-left:8px}
  .lang button{border:none;background:#fff;padding:7px 13px;font-size:13px;font-weight:700;color:var(--ink-soft);cursor:pointer}
  .lang button.on{background:var(--eu);color:#fff}
  .wrap{max-width:1180px;margin:0 auto;padding:0 24px}
  section{padding:72px 0;border-bottom:1px solid var(--line)}
  .eyebrow{text-transform:uppercase;letter-spacing:.12em;font-size:12px;font-weight:700;color:var(--eu)}
  h1{font-size:clamp(2.1rem,5vw,3.4rem);line-height:1.05;letter-spacing:-.02em;margin:.3em 0 .25em}
  h2{font-size:clamp(1.5rem,3vw,2.1rem);letter-spacing:-.02em;margin:.2em 0 .4em}
  .lead{font-size:1.15rem;color:var(--ink-soft);max-width:64ch}
  .muted{color:var(--ink-soft)}
  .hero{padding-top:64px}
  .hero-grid{display:grid;grid-template-columns:1.25fr .75fr;gap:40px;align-items:center}
  @media(max-width:840px){.hero-grid{grid-template-columns:1fr}}
  .stat-card{background:var(--bg-soft);border:1px solid var(--line);border-radius:var(--radius);padding:26px}
  .ring{display:flex;gap:18px;align-items:center}
  .donut{width:118px;height:118px;flex:none}
  .pillars{display:flex;flex-wrap:wrap;gap:8px;margin-top:18px}
  .chip{font-size:13px;padding:6px 12px;border-radius:999px;background:var(--eu-soft);color:var(--eu);font-weight:600;border:1px solid #d4e0ff}
  .cards{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:26px}
  @media(max-width:900px){.cards{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:540px){.cards{grid-template-columns:1fr}}
  .mini{background:var(--bg);border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow)}
  .mini h4{margin:.1em 0 .35em;font-size:1rem}
  .mini p{margin:0;font-size:.9rem;color:var(--ink-soft)}
  .map-help{display:flex;gap:18px;flex-wrap:wrap;align-items:center;margin:8px 0 18px;font-size:13px;color:var(--ink-soft)}
  .legend-dot{display:inline-block;width:11px;height:11px;border-radius:50%;margin-right:6px;vertical-align:middle}
  #mapWrap{position:relative;background:var(--bg-soft);border:1px solid var(--line);border-radius:var(--radius);padding:26px 20px;overflow:hidden}
  #edges{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
  .layer{position:relative;z-index:2;margin:0 0 30px}
  .layer:last-child{margin-bottom:0}
  .layer-label{font-size:11px;text-transform:uppercase;letter-spacing:.1em;font-weight:700;color:var(--ink-soft);margin-bottom:10px}
  .layer-row{display:flex;flex-wrap:wrap;gap:12px}
  .node{position:relative;background:#fff;border:1.5px solid var(--line);border-radius:11px;padding:10px 14px;cursor:pointer;font-size:13.5px;font-weight:600;transition:.18s;box-shadow:var(--shadow);max-width:240px}
  .node .ntag{display:block;font-size:11px;font-weight:600;color:var(--ink-soft);margin-top:2px}
  .node:hover{transform:translateY(-2px);border-color:var(--accent)}
  .node.dim{opacity:.28;filter:grayscale(.4)}
  .node.active{border-color:var(--eu);box-shadow:0 0 0 3px var(--eu-soft),var(--shadow)}
  .node.related{border-color:var(--accent);box-shadow:0 0 0 3px #e3efff,var(--shadow)}
  .node::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:11px 0 0 11px;background:var(--c,var(--eu))}
  .tl{position:relative;margin-top:20px}
  .tl-year{display:flex;gap:20px;margin-bottom:6px}
  .tl-year .yr{flex:none;width:74px;text-align:right;font-weight:800;font-size:1.25rem;color:var(--eu);padding-top:14px}
  .tl-track{flex:1;border-left:2px solid var(--line);padding:8px 0 22px 26px;position:relative}
  .tl-item{position:relative;background:#fff;border:1px solid var(--line);border-radius:11px;padding:12px 15px;margin-bottom:10px;box-shadow:var(--shadow);cursor:pointer;transition:.16s}
  .tl-item:hover{transform:translateX(3px);border-color:var(--accent)}
  .tl-item::before{content:"";position:absolute;left:-33px;top:18px;width:11px;height:11px;border-radius:50%;background:var(--c,var(--eu));border:2px solid #fff;box-shadow:0 0 0 2px var(--line)}
  .tl-item h4{margin:0 0 2px;font-size:.98rem}
  .tl-item .when{font-size:12px;color:var(--ink-soft)}
  .status{display:inline-block;font-size:11px;font-weight:700;padding:2px 9px;border-radius:999px;margin-left:8px;vertical-align:middle}
  .s-force{background:#e6f4ec;color:var(--green)}
  .s-prop{background:#fbf0dd;color:var(--amber)}
  .s-prog{background:#eee9f7;color:var(--violet)}
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin:6px 0 22px}
  .fbtn{padding:7px 14px;border-radius:999px;border:1px solid var(--line);background:#fff;font-size:13px;font-weight:600;color:var(--ink-soft);cursor:pointer;transition:.15s}
  .fbtn:hover{border-color:var(--accent);color:var(--ink)}
  .fbtn.on{background:var(--eu);border-color:var(--eu);color:#fff}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  @media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:600px){.grid{grid-template-columns:1fr}}
  .card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);cursor:pointer;transition:.16s;position:relative;overflow:hidden}
  .card:hover{transform:translateY(-3px);border-color:var(--accent)}
  .card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--c,var(--eu))}
  .card .cl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-soft)}
  .card h4{margin:.35em 0 .3em;font-size:1.05rem;letter-spacing:-.01em}
  .card p{margin:0;font-size:.88rem;color:var(--ink-soft)}
  .card .row{display:flex;align-items:center;gap:8px;margin-top:12px}
  .overlay{position:fixed;inset:0;background:rgba(16,24,48,.45);backdrop-filter:blur(2px);z-index:100;display:none;align-items:flex-start;justify-content:center;padding:40px 16px;overflow:auto}
  .overlay.open{display:flex}
  .modal{background:#fff;max-width:760px;width:100%;border-radius:18px;box-shadow:0 24px 70px rgba(10,20,50,.3);overflow:hidden;animation:pop .2s ease}
  @keyframes pop{from{transform:translateY(12px);opacity:0}to{transform:none;opacity:1}}
  .modal-head{padding:24px 28px;border-bottom:1px solid var(--line);position:relative}
  .modal-head .cl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--eu)}
  .modal-head h3{margin:.25em 0;font-size:1.5rem;letter-spacing:-.02em;padding-right:40px}
  .close{position:absolute;top:20px;right:22px;width:34px;height:34px;border-radius:50%;border:1px solid var(--line);background:#fff;cursor:pointer;font-size:18px;color:var(--ink-soft);line-height:1}
  .close:hover{background:var(--bg-soft)}
  .kv{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .kv .k{font-size:12px;background:var(--bg-soft);border:1px solid var(--line);padding:4px 10px;border-radius:999px;color:var(--ink-soft)}
  .tabs{display:flex;gap:4px;padding:14px 28px 0;flex-wrap:wrap}
  .tab{padding:9px 15px;border:none;background:none;font-size:14px;font-weight:600;color:var(--ink-soft);cursor:pointer;border-radius:9px 9px 0 0;border-bottom:2px solid transparent}
  .tab.on{color:var(--eu);border-bottom-color:var(--eu)}
  .panel{padding:18px 28px 28px;display:none;font-size:.96rem}
  .panel.on{display:block}
  .panel ul{margin:.2em 0;padding-left:20px}
  .panel li{margin-bottom:7px}
  .deps{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
  .dep{font-size:12.5px;padding:6px 11px;border-radius:999px;background:var(--eu-soft);color:var(--eu);font-weight:600;cursor:pointer;border:1px solid #d4e0ff}
  .dep:hover{background:#dbe7ff}
  .doclink{display:inline-block;margin-top:6px;font-weight:600}
  footer{padding:40px 0 60px;color:var(--ink-soft);font-size:.85rem}
  .disclaimer{background:var(--bg-soft);border:1px solid var(--line);border-radius:var(--radius);padding:16px 20px;font-size:.85rem;color:var(--ink-soft);margin-top:18px}
  .notebox{background:#fff7e6;border:1px solid #f0d9a8;color:#8a5a00;border-radius:10px;padding:11px 14px;font-size:.86rem;margin:0 0 16px}
  .notebox b{color:#7a4f00}
  .cnote{display:block;margin-top:10px;font-size:.76rem;color:#8a5a00;background:#fff7e6;border:1px solid #f0d9a8;border-radius:8px;padding:6px 9px;line-height:1.4}
  .tl-note{font-size:11.5px;color:#8a5a00;margin-top:4px}
  .inv-table-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--radius);margin-top:10px}
  table.inv{width:100%;border-collapse:collapse;font-size:.9rem;min-width:780px}
  table.inv th{text-align:left;background:var(--bg-soft);color:var(--ink-soft);font-size:11px;text-transform:uppercase;letter-spacing:.06em;padding:11px 14px;border-bottom:1px solid var(--line)}
  table.inv td{padding:12px 14px;border-bottom:1px solid var(--line);vertical-align:top}
  table.inv tbody tr:last-child td{border-bottom:none}
  table.inv tbody tr:hover{background:#fafcff}
  table.inv .nm{font-weight:600;white-space:nowrap}
  table.inv .nm .d{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:7px;vertical-align:middle}
  table.inv .num{font-variant-numeric:tabular-nums}
  .inv-dash{color:#9aa3b5}
  .inv-funds{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:12px}
  @media(max-width:700px){.inv-funds{grid-template-columns:1fr}}
  .inv-fund{background:var(--bg-soft);border:1px solid var(--line);border-radius:11px;padding:13px 15px}
  .inv-fund b{display:block;margin-bottom:4px}
  .inv-fund span{font-size:.85rem;color:var(--ink-soft)}
  .inv-chart{display:flex;gap:30px;align-items:center;flex-wrap:wrap;margin:16px 0 6px;background:var(--bg-soft);border:1px solid var(--line);border-radius:var(--radius);padding:22px}
  .inv-chart svg{flex:none}
  .inv-legend{display:flex;flex-direction:column;gap:9px}
  .inv-legend .it{display:flex;align-items:center;gap:10px;font-size:.9rem}
  .inv-legend .sw{width:13px;height:13px;border-radius:3px;flex:none}
  .inv-legend .amt{color:var(--ink-soft);margin-left:auto;font-variant-numeric:tabular-nums;padding-left:18px;white-space:nowrap}
</style>
</head>
<body>

<header class="nav">
  <div class="nav-inner">
    <div class="brand"><span class="stars">★</span> <span data-i18n="brand"></span></div>
    <nav class="nav-links">
      <a href="#overview" data-i18n="nav_overview"></a>
      <a href="#map" data-i18n="nav_map"></a>

      <a href="#investments" data-i18n="nav_invest"></a>

    <div class="lang" id="lang">
      <button data-lang="en">EN</button>
      <button data-lang="de">DE</button>

</header>

<section id="overview" class="hero">
  <div class="wrap">
    <div class="hero-grid">
      <div>
        <span class="eyebrow" data-i18n="hero_eyebrow"></span>
        <h1 data-i18n="hero_h1"></h1>
        <p class="lead" data-i18n="hero_lead"></p>
        <div class="pillars" id="pillars"></div>
      </div>
      <div class="stat-card">
        <div class="ring">
          <svg class="donut" viewBox="0 0 42 42" aria-label="80%">
            <circle cx="21" cy="21" r="15.9" fill="none" stroke="#e4e9f2" stroke-width="6"></circle>
            <circle cx="21" cy="21" r="15.9" fill="none" stroke="#003399" stroke-width="6" stroke-dasharray="80 100" stroke-dashoffset="25" stroke-linecap="round"></circle>
            <text x="21" y="22.5" text-anchor="middle" font-size="9" font-weight="700" fill="#003399">80%+</text>
          </svg>
          <div>
            <strong data-i18n="stat_title"></strong>
            <p class="muted" style="margin:.3em 0 0;font-size:.9rem" data-i18n="stat_body"></p>

        </div>
      </div>
    </div>
    <div class="cards" id="miniCards"></div>
  </div>
</section>

<section id="map">
  <div class="wrap">
    <span class="eyebrow" data-i18n="map_eyebrow"></span>
    <h2 data-i18n="map_h2"></h2>
    <p class="lead" data-i18n="map_lead"></p>
    <div class="map-help" id="legend"></div>
    <div id="mapWrap"><svg id="edges"></svg></div>
  </div>
</section>

<section id="timeline">
  <div class="wrap">
    <span class="eyebrow" data-i18n="timeline_eyebrow"></span>
    <h2 data-i18n="timeline_h2"></h2>
    <p class="lead" data-i18n="timeline_lead"></p>
    <div id="tl" class="tl"></div>
  </div>
</section>

<section id="explorer">
  <div class="wrap">
    <span class="eyebrow" data-i18n="explorer_eyebrow"></span>
    <h2 data-i18n="explorer_h2"></h2>
    <p class="lead" data-i18n="explorer_lead"></p>
    <div id="filters" class="filters"></div>
    <div id="grid" class="grid"></div>
  </div>
</section>

<section id="investments">
  <div class="wrap">
    <span class="eyebrow" data-i18n="inv_eyebrow"></span>
    <h2 data-i18n="inv_h2"></h2>
    <p class="lead" data-i18n="inv_lead"></p>
    <div class="notebox" data-i18n="inv_caveat" style="max-width:none"></div>
    <div class="inv-chart">
      <svg id="invPie" viewBox="0 0 240 240" width="240" height="240" role="img" aria-label="Funding by field"></svg>
      <div style="flex:1;min-width:280px">
        <h3 id="invChartTitle" style="margin:0 0 2px"></h3>
        <p class="muted" id="invChartSub" style="margin:.2em 0 14px;font-size:.85rem"></p>
        <div id="invLegend" class="inv-legend"></div>
        <p class="muted" id="invChartNote" style="margin:14px 0 0;font-size:.8rem"></p>
      </div>
    </div>
    <div class="inv-table-wrap"><table class="inv" id="invTable"></table></div>
    <h3 id="invFundsTitle" style="margin:28px 0 0"></h3>
    <div id="invFunds" class="inv-funds"></div>
  </div>
</section>

<footer>
  <div class="wrap">
    <strong data-i18n="footer_strong"></strong>
    <p data-i18n="footer_p"></p>
    <div class="disclaimer" data-i18n="footer_disclaimer"></div>
  </div>
</footer>

<div class="overlay" id="overlay"><div class="modal" id="modal" role="dialog" aria-modal="true"></div></div>

<script>
const L=(en,de)=>({en,de});
let lang = (()=>{try{return localStorage.getItem('eutslang')||'en'}catch(e){return 'en'}})();

const colorByKey={framework:"#6b4ea0",infra:"#1a73e8",regulation:"#003399",strategy:"#1f8a4c",cloud:"#0a8a99",horizontal:"#c77d18"};

  {n:L("Start-ups & scale-ups","Start-ups & Scale-ups"),v:5,c:"#c77d18"},
  {n:L("Cloud & edge","Cloud & Edge"),v:2.6,c:"#0a8a99"},
  {n:L("Connectivity","Konnektivität"),v:2.07,c:"#1f8a4c"},
  {n:L("Quantum","Quanten"),v:1,c:"#6b4ea0"},
  {n:L("Data spaces","Datenräume"),v:0.1,c:"#d23f6f"}
];

// helpers
const T=(v)=> (v && typeof v==='object' && ('en' in v)) ? v[lang] : v;
const byId=Object.fromEntries(DATA.map(d=>[d.id,d]));
const dependents={};
DATA.forEach(d=>d.buildsOn.forEach(t=>{(dependents[t]=dependents[t]||[]).push(d.id)}));
const clusterOrder=["framework","infra","regulation","strategy","cloud","horizontal"];
const mapWrap=document.getElementById('mapWrap');
const svg=document.getElementById('edges');
let activeNode=null, activeFilter="all";

function ui(k){return UI[lang][k];}

function renderStatic(){
  document.documentElement.lang=lang;
  document.querySelectorAll('[data-i18n]').forEach(el=>{el.textContent=ui(el.dataset.i18n);});
  // pillars
  document.getElementById('pillars').innerHTML=ui('pillars').map(p=>`<span class="chip">${p}</span>`).join('');
  // mini cards
  document.getElementById('miniCards').innerHTML=ui('mini').map(m=>`<div class="mini"><h4>${m.h}</h4><p>${m.p}</p></div>`).join('');
  // legend
  document.getElementById('legend').innerHTML=
    clusterOrder.map(k=>`<span><span class="legend-dot" style="background:${colorByKey[k]}"></span>${ui('cluster')[k]}</span>`).join('')
    +`<span style="margin-left:auto"><em>${ui('map_hint')}</em></span>`;
  // lang buttons
  document.querySelectorAll('#lang button').forEach(b=>b.classList.toggle('on',b.dataset.lang===lang));
}

function buildMap(){
  // remove existing layers (keep svg)
  mapWrap.querySelectorAll('.layer').forEach(n=>n.remove());
  ui('layers').forEach((label,i)=>{
    const layer=document.createElement('div');layer.className='layer';
    layer.innerHTML=`<div class="layer-label">${label}</div>`;
    const row=document.createElement('div');row.className='layer-row';
    DATA.filter(d=>d.layer===i).forEach(d=>{
      const n=document.createElement('div');
      n.className='node';n.dataset.id=d.id;n.style.setProperty('--c',colorByKey[d.cluster]);
      n.innerHTML=`${T(d.short)}<span class="ntag">${d.date} · ${T(d.statusLabel)}</span>`;
      n.addEventListener('mouseenter',()=>highlight(d.id));
      n.addEventListener('mouseleave',()=>{ if(activeNode) highlight(activeNode); else resetMap(); });
      n.addEventListener('click',e=>{e.stopPropagation();selectNode(d.id);});
      row.appendChild(n);
    });
    layer.appendChild(row);mapWrap.appendChild(layer);
  });
}
function nodeEl(id){return mapWrap.querySelector(`.node[data-id="${id}"]`);}
function centerOf(el){const r=el.getBoundingClientRect();const w=mapWrap.getBoundingClientRect();return {x:r.left-w.left+r.width/2,top:r.top-w.top,bottom:r.bottom-w.top};}
function drawEdges(active){
  svg.innerHTML='';const W=mapWrap.clientWidth,H=mapWrap.clientHeight;svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  DATA.forEach(d=>d.buildsOn.forEach(t=>{
    const a=nodeEl(d.id),b=nodeEl(t);if(!a||!b)return;
    const pa=centerOf(a),pb=centerOf(b);const x1=pa.x,y1=pa.top,x2=pb.x,y2=pb.bottom,my=(y1+y2)/2;
    const isAct=active&&(d.id===active||t===active);
    const p=document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d',`M${x1},${y1} C${x1},${my} ${x2},${my} ${x2},${y2}`);
    p.setAttribute('fill','none');p.setAttribute('stroke',isAct?colorByKey[byId[active].cluster]:'#c8d2e6');
    p.setAttribute('stroke-width',isAct?2.4:1.2);p.setAttribute('opacity',active?(isAct?1:.18):.55);
    svg.appendChild(p);
  }));
}
function highlight(id){
  const set=new Set([id,...byId[id].buildsOn,...(dependents[id]||[])]);
  mapWrap.querySelectorAll('.node').forEach(n=>{
    n.classList.remove('active','related','dim');
    if(n.dataset.id===id)n.classList.add('active');
    else if(set.has(n.dataset.id))n.classList.add('related');
    else n.classList.add('dim');
  });
  drawEdges(id);
}
function selectNode(id){activeNode=id;highlight(id);openModal(id);}
function resetMap(){activeNode=null;mapWrap.querySelectorAll('.node').forEach(n=>n.classList.remove('active','related','dim'));drawEdges(null);}
mapWrap.addEventListener('click',resetMap);
window.addEventListener('resize',()=>drawEdges(activeNode));

function scls(s){return s==='force'?'s-force':s==='prop'?'s-prop':'s-prog';}

function renderTimeline(){
  const tl=document.getElementById('tl');tl.innerHTML='';
  const years=[...new Set(DATA.map(d=>d.year))].sort();
  years.forEach(y=>{
    const items=DATA.filter(d=>d.year===y).sort((a,b)=>a.layer-b.layer);
    const block=document.createElement('div');block.className='tl-year';
    const track=items.map(d=>`<div class="tl-item" data-id="${d.id}" style="--c:${colorByKey[d.cluster]}">
        <h4>${T(d.name)}<span class="status ${scls(d.status)}">${T(d.statusLabel)}</span></h4>
        <div class="when">${d.date} · ${ui('cluster')[d.cluster]}</div>
        ${d.note?`<div class="tl-note">⚠ ${T(d.note)}</div>`:''}
      </div>`).join('');
    block.innerHTML=`<div class="yr">${y}</div><div class="tl-track">${track}</div>`;
    tl.appendChild(block);
  });
  tl.querySelectorAll('.tl-item').forEach(el=>el.addEventListener('click',()=>openModal(el.dataset.id)));
}

function renderFilters(){
  const f=document.getElementById('filters');f.innerHTML='';
  const keys=['all',...clusterOrder];
  keys.forEach(k=>{
    const b=document.createElement('button');b.className='fbtn'+(k===activeFilter?' on':'');
    b.textContent=k==='all'?ui('all'):ui('cluster')[k];
    b.addEventListener('click',()=>{activeFilter=k;renderFilters();renderGrid();});
    f.appendChild(b);
  });
}
function renderGrid(){
  const grid=document.getElementById('grid');grid.innerHTML='';
  DATA.filter(d=>activeFilter==='all'||d.cluster===activeFilter).forEach(d=>{
    const card=document.createElement('div');card.className='card';card.style.setProperty('--c',colorByKey[d.cluster]);
    const w=T(d.what);
    card.innerHTML=`<div class="cl">${ui('cluster')[d.cluster]}</div><h4>${T(d.name)}</h4><p>${w.slice(0,120)}…</p>
      <div class="row"><span class="status ${scls(d.status)}">${T(d.statusLabel)}</span><span class="when muted" style="font-size:12px">${d.date}</span></div>
      ${d.note?`<span class="cnote">⚠ ${T(d.note)}</span>`:''}`;
    card.addEventListener('click',()=>openModal(d.id));
    grid.appendChild(card);
  });
}

const overlay=document.getElementById('overlay');
const modal=document.getElementById('modal');
function liA(arr){return '<ul>'+arr.map(x=>`<li>${x}</li>`).join('')+'</ul>';}
function depChips(d){
  const on=d.buildsOn.map(t=>`<span class="dep" data-id="${t}">${ui('builds_on')(T(byId[t].short))}</span>`).join('');
  const rev=(dependents[d.id]||[]).map(t=>`<span class="dep" data-id="${t}">${ui('rev')(T(byId[t].short))}</span>`).join('');
  return (on||`<span class="muted">${ui('no_prereq')}</span>`)+'<div style="height:10px"></div>'+
    (rev?(`<div class="muted" style="margin-bottom:6px">${ui('deps_what')}</div>`+rev):'');
}
function openModal(id){
  const d=byId[id];const col=colorByKey[d.cluster];
  modal.innerHTML=`
    <div class="modal-head" style="border-top:5px solid ${col}">
      <button class="close" aria-label="Close">×</button>
      <div class="cl">${ui('cluster')[d.cluster]}</div>
      <h3>${T(d.name)}</h3>
      <div class="kv"><span class="k">${d.date}</span><span class="k">${T(d.doc)}</span><span class="status ${scls(d.status)}">${T(d.statusLabel)}</span></div>
    </div>
    <div class="tabs">
      <button class="tab on" data-p="0">${ui('tab_what')}</button>
      <button class="tab" data-p="1">${ui('tab_company')}</button>
      <button class="tab" data-p="2">${ui('tab_user')}</button>
      <button class="tab" data-p="3">${ui('tab_deps')}</button>
    </div>
    <div class="panel on" data-p="0">${d.note?`<div class="notebox"><b>${ui('note_label')}</b> ${T(d.note)}</div>`:''}<p>${T(d.what)}</p><a class="doclink" href="${d.docUrl}" target="_blank" rel="noopener">${ui('open_doc')}</a></div>
    <div class="panel" data-p="1"><strong>${ui('h_company')}</strong>${liA(T(d.company))}</div>
    <div class="panel" data-p="2"><strong>${ui('h_user')}</strong>${liA(T(d.user))}</div>
    <div class="panel" data-p="3"><strong>${ui('h_deps')}</strong><div class="deps" style="margin-top:10px">${depChips(d)}</div></div>`;
  overlay.classList.add('open');document.body.style.overflow='hidden';
  modal.querySelector('.close').onclick=closeModal;
  modal.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
    modal.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
    modal.querySelectorAll('.panel').forEach(x=>x.classList.remove('on'));
    t.classList.add('on');modal.querySelector(`.panel[data-p="${t.dataset.p}"]`).classList.add('on');
  });
  modal.querySelectorAll('.dep').forEach(c=>c.onclick=()=>openModal(c.dataset.id));
}
function closeModal(){overlay.classList.remove('open');document.body.style.overflow='';}
overlay.addEventListener('click',e=>{if(e.target===overlay)closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

function fmtBn(v){return lang==='de'?(String(v).replace('.',',')+' Mrd. €'):('€'+v+'bn');}
function invPolar(cx,cy,r,ang){const a=(ang-90)*Math.PI/180;return [cx+r*Math.cos(a),cy+r*Math.sin(a)];}
function invArc(cx,cy,rO,rI,a0,a1){
  const [x0,y0]=invPolar(cx,cy,rO,a0),[x1,y1]=invPolar(cx,cy,rO,a1);
  const [x2,y2]=invPolar(cx,cy,rI,a1),[x3,y3]=invPolar(cx,cy,rI,a0);
  const laf=(a1-a0)>180?1:0;
  return `M${x0.toFixed(2)},${y0.toFixed(2)} A${rO},${rO} 0 ${laf} 1 ${x1.toFixed(2)},${y1.toFixed(2)} L${x2.toFixed(2)},${y2.toFixed(2)} A${rI},${rI} 0 ${laf} 0 ${x3.toFixed(2)},${y3.toFixed(2)} Z`;
}
function renderInvChart(){
  const total=INVFIELDS.reduce((s,f)=>s+f.v,0);
  let ang=0,paths='';
  INVFIELDS.forEach(f=>{const a1=ang+f.v/total*360;
    paths+=`<path d="${invArc(120,120,100,58,ang,a1)}" fill="${f.c}" stroke="#fff" stroke-width="1.5"><title>${T(f.n)}: ${fmtBn(f.v)}</title></path>`;ang=a1;});
  const shown=Math.round(total*10)/10;
  document.getElementById('invPie').innerHTML=paths+
    `<text x="120" y="116" text-anchor="middle" font-size="15" font-weight="800" fill="#1b2333">~${fmtBn(shown)}</text>`+
    `<text x="120" y="135" text-anchor="middle" font-size="9.5" fill="#5a6478">${ui('inv_chart_total')}</text>`;
  document.getElementById('invChartTitle').textContent=ui('inv_chart_title');
  document.getElementById('invChartSub').textContent=ui('inv_chart_sub');
  document.getElementById('invChartNote').textContent=ui('inv_chart_note');
  document.getElementById('invLegend').innerHTML=INVFIELDS.map(f=>
    `<div class="it"><span class="sw" style="background:${f.c}"></span><span>${T(f.n)}</span><span class="amt">${fmtBn(f.v)} · ${Math.round(f.v/total*100)}%</span></div>`).join('');
}
function renderInvest(){
  const dash='<span class="inv-dash">—</span>';
  const cell=(v)=>{const s=T(v); return (!s||s==='—')?dash:s;};
  const tb=document.getElementById('invTable');
  tb.innerHTML=`<thead><tr><th>${ui('inv_col_init')}</th><th>${ui('inv_col_eu')}</th><th>${ui('inv_col_mob')}</th><th>${ui('inv_col_period')}</th><th>${ui('inv_col_note')}</th></tr></thead><tbody>`+
    DATA.map(d=>{const v=INV[d.id]||{};
      return `<tr><td class="nm"><span class="d" style="background:${colorByKey[d.cluster]}"></span>${T(d.short)}</td>
        <td class="num">${cell(v.eu)}</td><td class="num">${cell(v.mob)}</td><td>${cell(v.period)}</td><td class="muted">${v.note?T(v.note):''}</td></tr>`;
    }).join('')+`</tbody>`;
  document.getElementById('invFundsTitle').textContent=ui('inv_funds_title');
  document.getElementById('invFunds').innerHTML=ui('inv_funds').map(f=>`<div class="inv-fund"><b>${f.n}</b><span>${f.v}</span></div>`).join('');
}
function renderAll(){
  renderStatic();buildMap();renderTimeline();renderFilters();renderGrid();renderInvChart();renderInvest();
  setTimeout(()=>drawEdges(activeNode),60);
}
function setLang(l){lang=l;try{localStorage.setItem('eutslang',l)}catch(e){}renderAll();}
document.querySelectorAll('#lang button').forEach(b=>b.addEventListener('click',()=>setLang(b.dataset.lang)));

renderAll();
</script>
</body>
</html>
